name: RabbitMQ

services:
  RabbitMQ:
    container_name: rabbitmq
    image: rabbitmq:management
    mem_limit: 700m
    env_file: [ env/rabbitmq.env ]
    environment:
      TZ: Asia/Shanghai
    volumes: [ RabbitMQ-Data:/var/lib/rabbitmq ]
    network_mode: host
    restart: no
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"

volumes:
  RabbitMQ-Data:
    name: RabbitMQ-Data