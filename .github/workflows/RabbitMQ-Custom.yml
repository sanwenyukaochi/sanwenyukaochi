name: RabbitMQ Custom Image

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: rabbitmq-custom-image
  cancel-in-progress: false

env:
  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/rabbitmq-custom
  DOCKER_CONTEXT: ./.github/docker/rabbitmq-custom
  DOCKERFILE: ./.github/docker/rabbitmq-custom/Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Resolve versions
        id: versions
        shell: bash
        run: |
          bash ./.github/docker/rabbitmq-custom/resolve-versions.sh

      - name: Check image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.versions.outputs.rabbitmq_tag }}"

          if curl -fsSL "https://hub.docker.com/v2/repositories/${IMAGE_REPO}/tags/${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.image.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.image.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.DOCKER_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            RABBITMQ_TAG=${{ steps.versions.outputs.rabbitmq_tag }}
            DELAYED_PLUGIN_URL=${{ steps.versions.outputs.delayed_plugin_url }}
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.versions.outputs.rabbitmq_tag }}
            ${{ env.IMAGE_REPO }}:latest